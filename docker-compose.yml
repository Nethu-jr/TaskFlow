services:
  redis:
    image: redis:7-alpine
    ports: ["6379:6379"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: itss
      POSTGRES_PASSWORD: itss
      POSTGRES_DB: itss
    ports: ["5432:5432"]
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U itss"]
      interval: 5s
      timeout: 3s
      retries: 10

  backend:
    build:
      context: .
      dockerfile: docker/Dockerfile.backend
    environment:
      REDIS_URL: redis://redis:6379/0
      DATABASE_URL: postgresql+asyncpg://itss:itss@postgres:5432/itss
      ML_MODEL_PATH: /app/ml/models/priority_model.joblib
    ports: ["8000:8000"]
    depends_on:
      redis:    { condition: service_healthy }
      postgres: { condition: service_healthy }

  worker:
    build:
      context: .
      dockerfile: docker/Dockerfile.worker
    environment:
      REDIS_URL: redis://redis:6379/0
      DATABASE_URL: postgresql+asyncpg://itss:itss@postgres:5432/itss
      WORKER_CONCURRENCY: 4
    depends_on:
      redis:    { condition: service_healthy }
      postgres: { condition: service_healthy }
    deploy:
      replicas: 3

  frontend:
    build:
      context: .
      dockerfile: docker/Dockerfile.frontend
    ports: ["8080:80"]
    depends_on: [backend]

volumes:
  pgdata:
